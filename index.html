<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Follow-up">
  <title>Follow-up Scheduler — Wisdom Surgery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="msal.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f8fdfd; color: #1a2e3b; }
    .heading { font-family: 'Playfair Display', serif; }
    input[type="date"], input[type="time"] { color-scheme: light; }
    .nav-glass {
      background: rgba(248, 253, 253, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(42, 180, 180, 0.12);
    }
    .note-card { animation: slideIn 0.15s ease-out; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    main { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
  </style>
</head>

<body class="min-h-screen" style="background:#f8fdfd;">

  <!-- Header -->
  <header class="nav-glass sticky top-0 z-10 px-5 py-3">
    <div class="max-w-xl mx-auto flex items-center justify-between">
      <img src="logo.png" alt="Wisdom Surgery Clinic" class="h-9 w-auto">
      <div id="authBadge" class="flex items-center gap-1.5 text-xs cursor-pointer select-none" onclick="handleAuthClick()">
        <span id="authDot" class="w-2 h-2 rounded-full bg-amber-400 flex-shrink-0"></span>
        <span id="authLabel" class="text-slate-400">Not signed in</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 ml-0.5" style="color:#2ab4b4;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
    </div>
    <div class="max-w-xl mx-auto mt-1">
      <h1 class="heading text-base font-semibold" style="color:#1a2e3b;">Follow-up Scheduler</h1>
    </div>
  </header>

  <!-- Sign in screen -->
  <div id="signinScreen" class="max-w-xl mx-auto px-4 pt-16 pb-8 text-center">
    <div class="bg-white rounded-2xl p-8 border shadow-sm" style="border-color:rgba(42,180,180,0.15);">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:rgba(42,180,180,0.1);">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" style="color:#2ab4b4;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      </div>
      <h2 class="heading text-xl font-semibold mb-2" style="color:#1a2e3b;">Follow-up Scheduler</h2>
      <p class="text-slate-400 text-sm mb-6 leading-relaxed">Sign in with your Wisdom Surgery Microsoft account to post follow-up tasks directly to the shared Outlook calendar.</p>
      <button onclick="signIn()"
        class="w-full text-white font-semibold py-3.5 rounded-xl flex items-center justify-center gap-3 transition-opacity hover:opacity-90"
        style="background:linear-gradient(135deg,#2ab4b4 0%,#1e9696 100%);">
        <svg width="20" height="20" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Sign in with Microsoft
      </button>
    </div>
  </div>

  <!-- Main app (hidden until signed in) -->
  <main id="appMain" class="hidden max-w-xl mx-auto px-4 pt-5 pb-8">
    <div id="notesContainer" class="space-y-3"></div>

    <button onclick="addNote()" class="mt-3 w-full rounded-2xl py-3.5 flex items-center justify-center gap-2 text-sm font-medium transition-colors"
      style="border:2px dashed rgba(42,180,180,0.35);color:#2ab4b4;background:rgba(42,180,180,0.04);"
      onmouseover="this.style.background='rgba(42,180,180,0.09)'" onmouseout="this.style.background='rgba(42,180,180,0.04)'">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
      </svg>
      Add another follow-up
    </button>

    <button onclick="submitNotes()" id="submitBtn"
      class="mt-4 w-full text-white font-semibold py-4 rounded-2xl flex items-center justify-center gap-2 text-base"
      style="background:linear-gradient(135deg,#2ab4b4 0%,#1e9696 100%);"
      onmouseover="this.style.background='linear-gradient(135deg,#1e9696 0%,#177878 100%)'" onmouseout="this.style.background='linear-gradient(135deg,#2ab4b4 0%,#1e9696 100%)'">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      Send to Calendar
    </button>

    <div id="statusMsg" class="hidden mt-4 p-4 rounded-xl text-center text-sm font-medium"></div>
  </main>

  <script>
    const MSAL_CONFIG = {
      auth: {
        clientId: 'e02cd94b-271c-451f-83a0-2ed35cb1974b',
        authority: 'https://login.microsoftonline.com/a71b7593-8a5c-4418-8365-a16d34173cbe',
        redirectUri: 'https://anna-bryan-joys.github.io/wisdomsurgery-scheduler/'
      },
      cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false }
    };

    const SCOPES = ['Calendars.ReadWrite', 'Calendars.ReadWrite.Shared'];
    const SHARED_CALENDAR = 'adminteam@wisdomsurgery.clinic';
    const GRAPH_ENDPOINT = `https://graph.microsoft.com/v1.0/users/${SHARED_CALENDAR}/calendar/events`;

    const msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
    let currentAccount = null;
    let noteCount = 0;

    async function initApp() {
      await msalInstance.initialize();
      const response = await msalInstance.handleRedirectPromise();
      if (response) setAccount(response.account);
      const accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) setAccount(accounts[0]);
    }

    function setAccount(account) {
      currentAccount = account;
      document.getElementById('authDot').className = 'w-2 h-2 rounded-full flex-shrink-0 bg-emerald-400';
      document.getElementById('authLabel').textContent = account.name || account.username;
      document.getElementById('signinScreen').classList.add('hidden');
      document.getElementById('appMain').classList.remove('hidden');
      if (noteCount === 0) addNote();
    }

    function handleAuthClick() {
      if (currentAccount) signOut();
    }

    async function signIn() {
      try {
        await msalInstance.loginRedirect({ scopes: SCOPES });
      } catch (e) {
        console.error(e);
      }
    }

    function signOut() {
      currentAccount = null;
      document.getElementById('authDot').className = 'w-2 h-2 rounded-full flex-shrink-0 bg-amber-400';
      document.getElementById('authLabel').textContent = 'Not signed in';
      document.getElementById('signinScreen').classList.remove('hidden');
      document.getElementById('appMain').classList.add('hidden');
      msalInstance.logoutRedirect();
    }

    async function getToken() {
      try {
        const result = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: currentAccount });
        return result.accessToken;
      } catch {
        await msalInstance.acquireTokenRedirect({ scopes: SCOPES, account: currentAccount });
        throw new Error('Redirecting for auth');
      }
    }

    function todayStr() { return new Date().toISOString().split('T')[0]; }

    function addHour(t) {
      const [h, m] = t.split(':').map(Number);
      const d = new Date(0, 0, 0, h + 1, m);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function addNote() {
      noteCount++;
      const id = `note-${noteCount}`;
      const num = noteCount;
      const card = document.createElement('div');
      card.id = id;
      card.className = 'note-card rounded-2xl overflow-hidden';
      card.style.cssText = 'background:#fff;border:1px solid rgba(42,180,180,0.15);box-shadow:0 2px 12px rgba(42,180,180,0.07),0 1px 4px rgba(0,0,0,0.04);';
      card.innerHTML = `
        <div class="flex items-center justify-between px-4 pt-4 pb-2">
          <span class="text-[11px] font-semibold text-slate-400 uppercase tracking-widest">Follow-up ${num}</span>
          ${num > 1 ? `<button onclick="removeNote('${id}')" class="text-slate-300 hover:text-red-400 transition-colors p-1 -mr-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>` : ''}
        </div>
        <div class="px-4 pb-4 space-y-3">
          <input type="text" placeholder="Patient name or reference"
            class="note-title w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-slate-300 bg-slate-50">
          <textarea placeholder="What needs to happen — who to call, what to confirm, instructions to give..." rows="3"
            class="note-body w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-slate-300 bg-slate-50 resize-none leading-relaxed"></textarea>
          <div class="flex gap-3">
            <div class="flex-1">
              <label class="text-[11px] font-medium text-slate-400 uppercase tracking-wide mb-1 block">Date</label>
              <input type="date" min="${todayStr()}" value="${todayStr()}"
                class="note-date w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 bg-slate-50">
            </div>
            <div class="w-28 flex-shrink-0">
              <label class="text-[11px] font-medium text-slate-400 uppercase tracking-wide mb-1 block">Time</label>
              <input type="time" value="09:00"
                class="note-time w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 bg-slate-50">
            </div>
          </div>
        </div>`;
      document.getElementById('notesContainer').appendChild(card);
      card.querySelector('.note-title').focus();
    }

    function removeNote(id) { document.getElementById(id).remove(); }

    async function submitNotes() {
      const cards = document.querySelectorAll('#notesContainer > div');
      if (!cards.length) { showStatus('Add at least one follow-up before sending.', 'error'); return; }

      const notes = [];
      let invalid = false;
      cards.forEach(card => {
        const title = card.querySelector('.note-title').value.trim();
        const body  = card.querySelector('.note-body').value.trim();
        const date  = card.querySelector('.note-date').value;
        const time  = card.querySelector('.note-time').value || '09:00';
        if (!title || !body || !date) { invalid = true; return; }
        notes.push({ title, body, date, time });
      });

      if (invalid) { showStatus('Please fill in all fields before sending.', 'error'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = `<svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg> Sending...`;

      try {
        const token = await getToken();
        await Promise.all(notes.map(async note => {
          const res = await fetch(GRAPH_ENDPOINT, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              subject: note.title,
              body: { contentType: 'text', content: note.body },
              start: { dateTime: `${note.date}T${note.time}:00`, timeZone: 'E. Australia Standard Time' },
              end:   { dateTime: `${note.date}T${addHour(note.time)}:00`, timeZone: 'E. Australia Standard Time' }
            })
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(`Graph API ${res.status}: ${err?.error?.message || res.statusText}`);
          }
        }));

        showStatus(`${notes.length} follow-up${notes.length !== 1 ? 's' : ''} sent to the Outlook calendar.`, 'success');
        document.getElementById('notesContainer').innerHTML = '';
        noteCount = 0;
        addNote();

      } catch (e) {
        console.error(e);
        showStatus(e.message || 'Something went wrong. Check your connection and try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.style.background = 'linear-gradient(135deg,#2ab4b4 0%,#1e9696 100%)';
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg> Send to Calendar`;
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = `mt-4 p-4 rounded-xl text-center text-sm font-medium ${type === 'success' ? 'bg-teal-50 text-teal-700 border border-teal-100' : 'bg-red-50 text-red-600 border border-red-100'}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 6000);
    }

    initApp();
  </script>
</body>
</html>
